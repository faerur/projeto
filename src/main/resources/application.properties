spring.application.name=projeto
server.port=8081

spring.datasource.url= jdbc:postgresql://localhost:5432/CasosJudiciais
spring.datasource.username= postgres
spring.datasource.password = Mousemather202!
spring.jpa.hibernate.ddl-auto= update


spring.security.oauth2.client.registration.keycloak.client-id=projeto
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.scope=openid

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/SpringBootKeycloak
